<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="auth_check.js"></script>
    <div class="card">
        <h3><i class="fa-solid fa-user-shield"></i> PX TEAM ADMIN</h3>
        <button onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
    <div class="card">
        <div class="flex">
            <button onclick="fetchData('PX_X_BINOCULAR')">BINO</button>
            <button onclick="fetchData('PX_X_SPECTER')">SPEC</button>
            <button onclick="fetchData('PX_X_EIXOS')">EIXO</button>
        </div>
    </div>
    <div class="card">
        <h3><i class="fa-solid fa-plus"></i> Create License</h3>
        <select id="modType"><option value="PX_X_BINOCULAR">BINO</option><option value="PX_X_SPECTER">SPEC</option><option value="PX_X_EIXOS">EIXO</option></select>
        <input type="text" id="uname" placeholder="Username">
        <button onclick="createLicense()"><i class="fa-solid fa-check"></i> Submit</button>
    </div>
    <div class="card">
        <pre id="jsonDisplay">Pilih modul...</pre>
    </div>
    <script src="script.js"></script>
</body>
</html>
